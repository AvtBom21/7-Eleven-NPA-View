<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NPA Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --brand-green: #007a4d;
      --brand-red: #ff1732;
      --brand-orange: #ff7a1a;
      --ink: #0f172a;
      --ink-soft: #334155;
      --line: rgba(15, 23, 42, 0.16);
      --card: rgba(255, 255, 255, 0.92);
      --ok: #15803d;
      --err: #b91c1c;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: "Be Vietnam Pro", sans-serif;
      color: var(--ink);
      overflow: hidden;
      background:
        radial-gradient(1200px 680px at -8% -10%, rgba(255, 122, 26, .38), transparent 58%),
        radial-gradient(1000px 620px at 110% -20%, rgba(255, 23, 50, .28), transparent 60%),
        radial-gradient(900px 520px at 60% 120%, rgba(0, 122, 77, .26), transparent 62%),
        linear-gradient(145deg, #f6f7f8, #e4e8eb);
    }
    .stage {
      min-height: 100%;
      padding: 24px;
      display: grid;
      place-items: center;
      position: relative;
    }
    .stage::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(transparent 97%, rgba(15,23,42,.03) 98%),
        linear-gradient(90deg, transparent 97%, rgba(15,23,42,.03) 98%);
      background-size: 100% 26px, 26px 100%;
      opacity: .24;
      pointer-events: none;
      animation: drift 16s linear infinite;
    }
    @keyframes drift {
      from { transform: translateY(0); }
      to { transform: translateY(26px); }
    }
    .orb {
      position: absolute;
      border-radius: 999px;
      filter: blur(2px);
      opacity: .4;
      animation: floatY 7s ease-in-out infinite;
      pointer-events: none;
    }
    .orb.o1 {
      width: 180px; height: 180px;
      left: 6%; top: 16%;
      background: radial-gradient(circle at 30% 30%, #fff, rgba(255,122,26,.8));
    }
    .orb.o2 {
      width: 220px; height: 220px;
      right: 8%; bottom: 14%;
      background: radial-gradient(circle at 30% 30%, #fff, rgba(255,23,50,.75));
      animation-delay: -2.1s;
    }
    .orb.o3 {
      width: 120px; height: 120px;
      right: 20%; top: 12%;
      background: radial-gradient(circle at 30% 30%, #fff, rgba(0,122,77,.75));
      animation-delay: -1.3s;
    }
    .scene {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      z-index: 0;
    }
    .store-gate {
      position: absolute;
      left: 50%;
      top: 53%;
      width: 240px;
      height: 140px;
      transform: translate(-50%, -50%);
      border-radius: 20px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.65), rgba(255,255,255,.15)),
        linear-gradient(135deg, rgba(0,122,77,.18), rgba(255,122,26,.15), rgba(255,23,50,.16));
      border: 1px solid rgba(255,255,255,.55);
      box-shadow:
        0 0 0 8px rgba(255,255,255,.12),
        0 18px 46px rgba(15,23,42,.18),
        inset 0 0 24px rgba(255,255,255,.38);
      opacity: .55;
    }
    .store-gate::before {
      content: "";
      position: absolute;
      left: 8%;
      right: 8%;
      top: 12%;
      height: 8px;
      border-radius: 999px;
      background: linear-gradient(90deg, #ff7a1a, #ff1732, #007a4d);
      box-shadow: 0 0 10px rgba(255,23,50,.35);
    }
    .store-gate::after {
      content: "";
      position: absolute;
      inset: 20% 12% 12%;
      border-radius: 12px;
      background: linear-gradient(180deg, rgba(255,255,255,.48), rgba(255,255,255,.04));
    }
    .lane {
      position: absolute;
      left: 50%;
      top: 53%;
      width: 100%;
      height: 100%;
      transform: translate(-50%, -50%);
      filter: blur(.2px);
    }
    .pkg {
      position: absolute;
      left: 50%;
      top: 50%;
      min-width: 156px;
      height: 58px;
      padding: 0 20px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 11px;
      color: #0f172a;
      font-size: 20px;
      font-weight: 700;
      letter-spacing: .1px;
      background: rgba(255,255,255,.82);
      border: 1px solid rgba(255,255,255,.8);
      box-shadow: 0 10px 20px rgba(15,23,42,.16);
      opacity: 0;
      transform: translate(var(--sx), var(--sy)) scale(.7);
      animation: toStore var(--dur, 7.2s) linear var(--delay, 0s) infinite;
      will-change: transform, opacity;
    }
    .pkg b { font-size: 24px; }
    @keyframes toStore {
      0% {
        transform: translate(var(--sx), var(--sy)) scale(.65);
        opacity: 0;
      }
      8% { opacity: .86; }
      76% { opacity: .88; }
      100% {
        transform: translate(var(--tx), var(--ty)) scale(.58);
        opacity: 0;
      }
    }
    @keyframes floatY {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-14px); }
    }
    .card {
      width: 100%;
      max-width: 460px;
      border-radius: 24px;
      border: 1px solid rgba(255,255,255,.8);
      background: var(--card);
      box-shadow:
        0 36px 70px rgba(15, 23, 42, .18),
        inset 0 1px 0 rgba(255,255,255,.9);
      position: relative;
      overflow: hidden;
      transform-style: preserve-3d;
      animation: fadeIn .55s ease both;
      z-index: 2;
    }
    .card.is-error {
      animation: shakeX .34s ease both;
    }
    @keyframes shakeX {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-6px); }
      40% { transform: translateX(5px); }
      60% { transform: translateX(-4px); }
      80% { transform: translateX(3px); }
    }
    .card::before {
      content: "";
      position: absolute;
      inset: -120% -20%;
      background: linear-gradient(
        105deg,
        transparent 34%,
        rgba(255,255,255,.6) 50%,
        transparent 66%
      );
      transform: translateX(-70%);
      animation: shine 5.2s ease-in-out infinite;
      pointer-events: none;
    }
    @keyframes shine {
      0%, 65% { transform: translateX(-70%); }
      100% { transform: translateX(70%); }
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px) scale(.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    .top {
      padding: 24px 24px 16px;
      background:
        linear-gradient(130deg, rgba(255,122,26,.1), rgba(255,23,50,.08) 45%, rgba(0,122,77,.1));
      border-bottom: 1px solid rgba(15,23,42,.06);
      text-align: center;
    }
    .logo-wrap {
      display: inline-grid;
      place-items: center;
      width: 98px;
      height: 98px;
      border-radius: 22px;
      background: #fff;
      box-shadow: 0 12px 24px rgba(15,23,42,.18);
      margin: 0 auto 14px;
      transform: translateZ(18px);
    }
    .logo {
      width: 82px;
      height: 82px;
      object-fit: contain;
      filter: saturate(1.1) contrast(1.08);
    }
    h1 {
      margin: 0;
      font-family: "Plus Jakarta Sans", "Be Vietnam Pro", sans-serif;
      font-weight: 800;
      letter-spacing: -.4px;
      font-size: 32px;
      line-height: .96;
      white-space: nowrap;
    }
    .brand {
      color: var(--brand-green);
    }
    .brand-2 {
      color: #0f172a;
      font-weight: 800;
    }
    .sub {
      margin: 8px auto 0;
      max-width: none;
      color: var(--ink-soft);
      font-size: 15px;
      line-height: 1.32;
      font-weight: 500;
      white-space: nowrap;
    }
    .body {
      padding: 18px 24px 24px;
      display: grid;
      gap: 10px;
    }
    .lbl {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: .1px;
      color: #1f2937;
      margin: 2px 0 -2px;
    }
    .field {
      position: relative;
    }
    .inp {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 12px;
      font-size: 16px;
      color: var(--ink);
      padding: 12px 14px;
      outline: none;
      background: rgba(255,255,255,.9);
      transition: border-color .18s, box-shadow .18s, transform .04s;
    }
    .inp:focus {
      border-color: var(--brand-green);
      box-shadow: 0 0 0 4px rgba(0,122,77,.14);
    }
    .eye {
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      border: none;
      background: transparent;
      color: #64748b;
      cursor: pointer;
      border-radius: 8px;
      padding: 5px 8px;
      font-size: 12px;
      font-weight: 700;
    }
    .eye:hover { background: rgba(15,23,42,.06); }
    .btn {
      margin-top: 4px;
      width: 100%;
      border: none;
      border-radius: 12px;
      padding: 12px;
      color: #fff;
      font-size: 16px;
      font-weight: 800;
      letter-spacing: .4px;
      font-family: "Plus Jakarta Sans", "Be Vietnam Pro", sans-serif;
      cursor: pointer;
      background:
        linear-gradient(95deg, var(--brand-orange), var(--brand-red) 48%, var(--brand-green));
      background-size: 160% 100%;
      box-shadow: 0 14px 24px rgba(0,122,77,.24);
      transition: transform .06s, filter .2s, background-position .4s;
      position: relative;
      overflow: hidden;
    }
    .btn:hover {
      filter: saturate(1.05);
      background-position: 100% 0;
    }
    .btn:active { transform: translateY(1px); }
    .btn[disabled] { opacity: .65; cursor: wait; filter: grayscale(.2); }
    .ripple {
      position: absolute;
      width: 12px;
      height: 12px;
      border-radius: 999px;
      background: rgba(255,255,255,.46);
      transform: translate(-50%, -50%) scale(0);
      animation: ripple .56s ease-out forwards;
      pointer-events: none;
    }
    @keyframes ripple {
      to { transform: translate(-50%, -50%) scale(18); opacity: 0; }
    }
    .progress {
      margin-top: 8px;
      height: 4px;
      border-radius: 999px;
      background: rgba(15,23,42,.09);
      overflow: hidden;
      opacity: 0;
      transition: opacity .18s ease;
    }
    .progress.on { opacity: 1; }
    .progress-bar {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #ff7a1a, #ff1732, #007a4d);
      transition: width .2s ease;
    }
    .msg {
      margin-top: 2px;
      min-height: 22px;
      font-size: 13px;
      font-weight: 600;
      line-height: 1.25;
      color: #334155;
    }
    .msg.err { color: var(--err); }
    .msg.ok { color: var(--ok); }
    .caps {
      min-height: 16px;
      margin-top: -4px;
      font-size: 11px;
      color: #b45309;
      font-weight: 600;
      opacity: 0;
      transition: opacity .15s ease;
    }
    .caps.on { opacity: 1; }
    .hint {
      margin-top: 4px;
      font-size: 12px;
      color: #64748b;
      line-height: 1.3;
    }
    @media (max-width: 560px) {
      .stage { padding: 12px; }
      .card { border-radius: 18px; }
      .top { padding: 18px 16px 12px; }
      .body { padding: 14px 16px 16px; }
      h1 {
        font-size: 30px;
        white-space: normal;
      }
      .sub { font-size: 15px; }
      .lbl { font-size: 13px; }
      .inp { font-size: 15px; }
      .btn { font-size: 16px; }
      .msg { font-size: 13px; }
      .hint { font-size: 11px; }
      .logo-wrap { width: 82px; height: 82px; border-radius: 16px; }
      .logo { width: 68px; height: 68px; }
      .store-gate { width: 180px; height: 110px; top: 57%; opacity: .48; }
      .pkg {
        min-width: 108px;
        height: 44px;
        padding: 0 14px;
        font-size: 15px;
        gap: 8px;
      }
      .pkg b { font-size: 19px; }
    }
  </style>
</head>
<body>

            referrerpolicy="no-referrer"
          >
          <svg id="logoFallback" viewBox="0 0 100 100" aria-label="7-Eleven Fallback Logo" style="display:none;width:72px;height:72px">
            <rect x="8" y="8" width="70" height="16" fill="#ff7a1a"></rect>
            <path d="M82,8 L82,30 C63,42 52,59 50,82 L24,82 C27,54 45,28 72,16 Z" fill="#ff1732"></path>
            <rect x="42" y="84" width="22" height="12" fill="#ff1732"></rect>

          <input class="inp" id="email" type="email" placeholder="name@7-eleven.vn" value="<?= prefillEmail ?>" autocomplete="username" />

        <label class="lbl" for="password">PASSWORD</label>

          <input class="inp" id="password" type="password" placeholder="••••••••" autocomplete="current-password" />

        <button class="btn" id="btnLogin" onclick="doLogin()">ĐĂNG NHẬP</button>

        <div id="msg" class="msg <?= loginMessage ? 'err' : '' ?>"><?= loginMessage ?></div>

  <script>
    var _card = document.getElementById('loginCard');
    var _email = document.getElementById('email');
    var _pwd = document.getElementById('password');
    var _btn = document.getElementById('btnLogin');
    var _caps = document.getElementById('capsHint');
    var _progress = document.getElementById('loginProgress');
    var _progressBar = document.getElementById('loginProgressBar');
    var _loadingTimer = null;

    function _toErrorText(err, fallback) {
      var fb = fallback || 'Unknown';
      try {
        if (err === null || err === undefined) return fb;
        if (typeof err === 'string') return err;
        if (typeof err.message === 'string' && err.message.trim()) return err.message;
        if (err.error && typeof err.error.message === 'string' && err.error.message.trim()) return err.error.message;
        var s = (typeof err.toString === 'function') ? err.toString() : '';
        if (s && s !== '[object Object]') return s;
        var json = JSON.stringify(err);
        return (json && json !== '{}') ? json : fb;
      } catch (e) {
        return fb;
      }
    }

    function setMsg(text, mode) {
      var el = document.getElementById('msg');
      el.textContent = text || '';
      el.className = 'msg ' + (mode || '');
    }

    function setLoading(flag) {
      _btn.disabled = !!flag;
      _btn.textContent = flag ? 'ĐANG XÁC THỰC...' : 'ĐĂNG NHẬP';
      if (flag) {
        _progress.classList.add('on');
        _progressBar.style.width = '14%';
        if (_loadingTimer) clearInterval(_loadingTimer);
        _loadingTimer = setInterval(function() {
          var now = parseFloat(_progressBar.style.width) || 0;
          var next = Math.min(92, now + Math.random() * 14);
          _progressBar.style.width = next + '%';
        }, 220);
      } else {
        if (_loadingTimer) clearInterval(_loadingTimer);
        _loadingTimer = null;
      }
    }

    function completeProgress() {
      _progressBar.style.width = '100%';
      setTimeout(function() {
        _progress.classList.remove('on');
        _progressBar.style.width = '0%';
      }, 260);
    }

    function errorMotion() {
      _card.classList.remove('is-error');
      void _card.offsetWidth;
      _card.classList.add('is-error');
    }

    function normalizeLoginEmail(value) {
      var raw = String(value || '');
      if (raw && typeof raw.normalize === 'function') raw = raw.normalize('NFKC');
      return raw
        .replace(/[\u200B-\u200D\uFEFF]/g, '')
        .replace(/\s+/g, '')
        .trim()
        .toLowerCase();
    }

    function doLogin() {
      var email = normalizeLoginEmail(_email.value || '');
      var password = (_pwd.value || '');
      _email.value = email;

      if (!email) {
        setMsg('Vui lòng nhập email.', 'err');
        _email.focus();
        return;
      }
      if (!password) {
        setMsg('Vui lòng nhập mật khẩu.', 'err');
        _pwd.focus();
        return;
      }

      setLoading(true);
      setMsg('Đang kiểm tra quyền truy cập...', '');

      google.script.run
        .withSuccessHandler(function(res) {
          setLoading(false);
          if (!res || !res.ok) {
            setMsg(_toErrorText(res && res.error ? res.error : res, 'Đăng nhập thất bại'), 'err');
            errorMotion();
            completeProgress();
            return;
          }
          try { localStorage.setItem('npa_last_email', email); } catch (e) {}
          setMsg('Đăng nhập thành công. Đang chuyển trang...', 'ok');
          completeProgress();
          window.location.href = res.data.url;
        })
        .withFailureHandler(function(err) {
          setLoading(false);
          setMsg('Lỗi hệ thống: ' + _toErrorText(err, 'Unknown'), 'err');
          errorMotion();
          completeProgress();
        })
        .loginWithEmail(email, password);
    }

    document.getElementById('togglePwd').addEventListener('click', function() {
      var isHide = _pwd.type === 'password';
      _pwd.type = isHide ? 'text' : 'password';
      this.textContent = isHide ? 'ẨN' : 'HIỆN';
      _pwd.focus();
    });

    _email.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') doLogin();
    });
    _pwd.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') doLogin();
      if (typeof e.getModifierState === 'function') {
        _caps.classList.toggle('on', e.getModifierState('CapsLock'));
      }
    });
    _pwd.addEventListener('keyup', function(e) {
      if (typeof e.getModifierState === 'function') {
        _caps.classList.toggle('on', e.getModifierState('CapsLock'));
      }
    });

    // button ripple
    _btn.addEventListener('click', function(e) {
      var rect = _btn.getBoundingClientRect();
      var dot = document.createElement('span');
      dot.className = 'ripple';
      dot.style.left = (e.clientX - rect.left) + 'px';
      dot.style.top = (e.clientY - rect.top) + 'px';
      _btn.appendChild(dot);
      setTimeout(function() { if (dot.parentNode) dot.remove(); }, 650);
    });

    // remember last email
    (function hydrateLastEmail() {
      if ((_email.value || '').trim()) return;
      try {
        var last = localStorage.getItem('npa_last_email');
        if (last) _email.value = last;
      } catch (e) {}
    })();

    // Drive image fallback
    (function initLogoFallback() {
      var img = document.getElementById('brandLogo');
      var fb = document.getElementById('logoFallback');
      if (!img || !fb) return;
      img.addEventListener('error', function() {
        img.style.display = 'none';
        fb.style.display = 'block';
      });
    })();

    // Lightweight parallax on desktop
    document.addEventListener('mousemove', function(e) {
      if (window.innerWidth < 700) return;
      var r = _card.getBoundingClientRect();
      var x = (e.clientX - (r.left + r.width / 2)) / r.width;
      var y = (e.clientY - (r.top + r.height / 2)) / r.height;
      var rx = Math.max(-6, Math.min(6, -y * 8));
      var ry = Math.max(-7, Math.min(7, x * 8));
      _card.style.transform = 'perspective(1000px) rotateX(' + rx + 'deg) rotateY(' + ry + 'deg)';
    });
    document.addEventListener('mouseleave', function() {
      _card.style.transform = 'perspective(1000px) rotateX(0deg) rotateY(0deg)';
    });
  </script>
</body>
</html>
